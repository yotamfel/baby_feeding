<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Baby Feeding Tracker</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#5b8dee">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Feeding">
  <link rel="apple-touch-icon" href="/icon.svg">
</head>
<body>

  <!-- Session modal -->
  <div id="session-modal" class="modal-overlay">
    <div class="modal-card">
      <div class="modal-icon">🍼</div>
      <h1>Baby Feeding Tracker</h1>
      <p>Enter your session code to sync with your partner, or create a new one.</p>
      <div class="modal-join">
        <input type="text" id="session-input" placeholder="e.g. XK7M2P" maxlength="10" autocomplete="off" autocapitalize="characters" />
        <button class="btn btn-primary" onclick="joinSession()">Join</button>
      </div>
      <div class="modal-divider"><span>or</span></div>
      <button class="btn btn-outline" onclick="createSession()">Create new session</button>
    </div>
  </div>

  <header>
    <h1>🍼 Baby Feeding Tracker</h1>
    <div id="session-bar" class="session-bar">
      <span class="session-label">Session: <strong id="session-code-display"></strong></span>
      <button class="btn-pill" id="copy-btn" onclick="copyCode()">Copy Code</button>
      <button class="btn-pill btn-pill-danger" onclick="logout()">Log Out</button>
    </div>
  </header>

  <div class="container">

    <div class="card">
      <h2>New Entry</h2>
      <form id="feeding-form">
        <div class="form-row">
          <label>Date<input type="date" id="date" required /></label>
          <label>Time<input type="time" id="time" required /></label>
        </div>
        <div class="form-row">
          <label>Ate from bottle (ml)<input type="number" id="amount_eaten" min="0" required /></label>
          <label>Added to feeding (ml)<input type="number" id="amount_added" min="0" required /></label>
        </div>
        <div class="form-actions">
          <button type="submit" class="btn btn-primary">Add Entry</button>
        </div>
      </form>
    </div>

    <div class="card">
      <h2>Export Data</h2>
      <div class="export-row">
        <label>From<input type="date" id="export-from" /></label>
        <label>To<input type="date" id="export-to" /></label>
        <div class="export-buttons">
          <button class="btn btn-export" onclick="exportData()">View Report (Range)</button>
          <button class="btn btn-export-all" onclick="exportAll()">View Full Report</button>
        </div>
      </div>
    </div>

    <div class="card">
      <h2>Feeding Log</h2>
      <div class="table-wrapper">
        <table id="feedings-table">
          <thead>
            <tr>
              <th>Date</th>
              <th>Time</th>
              <th>Ate (ml)</th>
              <th>Added (ml)</th>
              <th></th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
    </div>

  </div>
  <script src="app.js"></script>
</body>
</html>
