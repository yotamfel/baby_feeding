<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Baby Feeding Tracker</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <h1>Baby Feeding Tracker</h1>

    <form id="feeding-form">
      <div class="form-row">
        <label>Date<input type="date" id="date" required /></label>
        <label>Time<input type="time" id="time" required /></label>
      </div>
      <div class="form-row">
        <label>Ate from bottle (ml)<input type="number" id="amount_eaten" min="0" required /></label>
        <label>Added to bottle (ml)<input type="number" id="amount_added" min="0" required /></label>
      </div>
      <button type="submit">Add Entry</button>
    </form>

    <table id="feedings-table">
      <thead>
        <tr>
          <th>Date</th>
          <th>Time</th>
          <th>Ate (ml)</th>
          <th>Added (ml)</th>
          <th></th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>
  <script src="app.js"></script>
</body>
</html>
