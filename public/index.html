<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>מעקב האכלת תינוק</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#5b8dee">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Feeding">
  <link rel="apple-touch-icon" href="/icon.svg">
</head>
<body>

  <!-- Edit modal -->
  <div id="edit-modal" class="edit-overlay">
    <div class="edit-card">
      <h2>עריכת רשומה</h2>
      <input type="hidden" id="edit-id" />
      <div class="form-row">
        <label>תאריך<input type="date" id="edit-date" required /></label>
        <label>שעה<input type="time" id="edit-time" required /></label>
      </div>
      <div class="form-row">
        <label>אכל מהבקבוק (מ"ל)<input type="number" id="edit-amount-eaten" min="0" required /></label>
        <label>נוסף להאכלה (מ"ל)<input type="number" id="edit-amount-added" min="0" required /></label>
      </div>
      <div class="form-row">
        <label>הערות (לא חובה)<input type="text" id="edit-notes" placeholder="למשל: נראה רעב, עצבני..." /></label>
      </div>
      <div class="edit-actions">
        <button class="btn btn-cancel" onclick="closeEditModal()">ביטול</button>
        <button class="btn btn-primary" onclick="saveEdit()">שמור</button>
      </div>
    </div>
  </div>

  <!-- Session modal -->
  <div id="session-modal" class="modal-overlay">
    <div class="modal-card">
      <div class="modal-icon">🍼</div>
      <h1>מעקב האכלת תינוק</h1>
      <p>בחרו שם סשן וסיסמא.<br>שתפו עם הפרטנר לסנכרון נתונים.</p>
      <div class="modal-fields">
        <input type="text" id="session-name" placeholder="שם סשן (למשל: ליאור)" autocomplete="off" />
        <input type="password" id="session-password" placeholder="סיסמא" autocomplete="off" />
      </div>
      <button class="btn btn-primary btn-full" onclick="startSession()">כניסה</button>
      <p id="session-error" class="session-error"></p>
      <p class="modal-hint">בפעם הראשונה? זה יצור את הסשן שלכם.<br>חוזרים? הזינו את אותו שם וסיסמא.</p>
    </div>
  </div>

  <header>
    <h1>🍼 מעקב האכלת תינוק</h1>
    <div id="session-bar" class="session-bar">
      <span class="session-label">סשן: <strong id="session-name-display"></strong></span>
      <button class="btn-pill" id="share-btn" onclick="shareLink()">שתף</button>
      <button class="btn-pill btn-pill-danger" onclick="logout()">התנתק</button>
    </div>
  </header>

  <nav class="app-nav">
    <a href="/" class="nav-link active">🏠 בית</a>
    <a href="/stats.html" class="nav-link">📊 סטטיסטיקות</a>
  </nav>

  <div class="container">

    <div class="card">
      <h2>רשומה חדשה</h2>
      <form id="feeding-form">
        <div class="form-row">
          <label>תאריך<input type="date" id="date" required /></label>
          <label>שעה<input type="time" id="time" required /></label>
        </div>
        <div class="form-row">
          <label>אכל מהבקבוק (מ"ל)<input type="number" id="amount_eaten" min="0" required /></label>
          <label>נוסף להאכלה (מ"ל)<input type="number" id="amount_added" min="0" required /></label>
        </div>
        <div class="form-row">
          <label>הערות (לא חובה)<input type="text" id="notes" placeholder="למשל: נראה רעב, עצבני..." /></label>
        </div>
        <div class="form-actions">
          <button type="submit" class="btn btn-primary">הוסף רשומה</button>
        </div>
      </form>
    </div>

    <div class="card">
      <h2>ייצוא נתונים</h2>
      <div class="export-row">
        <label>מ-<input type="date" id="export-from" /></label>
        <label>עד<input type="date" id="export-to" /></label>
        <div class="export-buttons">
          <button class="btn btn-export" onclick="exportData()">הצג דוח (טווח)</button>
          <button class="btn btn-export-all" onclick="exportAll()">הצג דוח מלא</button>
        </div>
      </div>
    </div>

    <div class="card">
      <h2>יומן האכלה</h2>
      <div class="table-wrapper">
        <table id="feedings-table">
          <thead>
            <tr>
              <th>תאריך</th>
              <th>שעה</th>
              <th>אכל (מ"ל)</th>
              <th>נוסף (מ"ל)</th>
              <th>הערות</th>
              <th></th>
              <th></th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
      <div id="pagination" class="pagination"></div>
    </div>

  </div>
  <script src="app.js"></script>
</body>
</html>
