<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>סטטיסטיקות - מעקב האכלת תינוק</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#5b8dee">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Feeding">
  <link rel="apple-touch-icon" href="/icon.svg">
</head>
<body>

  <!-- Edit marker modal -->
  <div id="edit-marker-modal" class="edit-overlay">
    <div class="edit-card">
      <h2>עריכת נקודת עניין</h2>
      <input type="hidden" id="edit-marker-id" />
      <div class="form-row">
        <label>תאריך<input type="date" id="edit-marker-date" required /></label>
        <label>שעה<input type="time" id="edit-marker-time" required /></label>
      </div>
      <div class="form-row">
        <label>תיאור<input type="text" id="edit-marker-label" /></label>
      </div>
      <div class="edit-actions">
        <button class="btn btn-cancel" onclick="closeEditMarkerModal()">ביטול</button>
        <button class="btn btn-primary" onclick="saveMarkerEdit()">שמור</button>
      </div>
    </div>
  </div>

  <header>
    <h1>🍼 מעקב האכלת תינוק</h1>
    <div class="session-bar">
      <span class="session-label">משתמש: <strong id="session-name-display"></strong></span>
      <button class="btn-pill btn-pill-danger" onclick="logout()">התנתק</button>
    </div>
  </header>

  <nav class="app-nav">
    <a href="/" class="nav-link">🏠 בית</a>
    <a href="/stats.html" class="nav-link active">📊 סטטיסטיקות</a>
  </nav>

  <div class="container">

    <div class="card">
      <div class="stats-controls">
        <label>גרף
          <select id="graph-type">
            <option value="per-feeding">כמות אכילה</option>
            <option value="daily-total">סה"כ יומי</option>
            <option value="ate-vs-added">אכילה מול הוספה לפי יום</option>
          </select>
        </label>
        <label>מ-<input type="date" id="stats-from" /></label>
        <label>עד<input type="date" id="stats-to" /></label>
        <label>מ-נקודה
          <select id="filter-from-marker"><option value="">ללא</option></select>
        </label>
        <label>עד-נקודה
          <select id="filter-to-marker"><option value="">ללא</option></select>
        </label>
        <button class="btn btn-export-all stats-alltime" onclick="setAllTime()">כל הזמן</button>
      </div>
    </div>

    <div class="card chart-card">
      <div id="no-data" class="empty-state" style="display:none">לא נמצאו רשומות בטווח זה.</div>
      <canvas id="feeding-chart"></canvas>
    </div>

    <div class="card">
      <h2>נקודות עניין</h2>
      <div class="form-row">
        <label>תאריך<input type="date" id="marker-date" /></label>
        <label>שעה<input type="time" id="marker-time" /></label>
        <label>תיאור<input type="text" id="marker-label" placeholder="למשל: שינוי פורמולה" /></label>
      </div>
      <div class="form-actions">
        <button class="btn btn-primary" onclick="addMarker()">הוסף נקודה</button>
      </div>
      <div id="markers-list"></div>
    </div>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-annotation@3"></script>
  <script src="stats.js"></script>
</body>
</html>
